<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Anti-FOUC: apply dark class before first paint based on stored preference -->
    <script>
      try {
        var t = localStorage.getItem('cairn_theme') || 'dark';
        if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cairn — Operator Control Plane</title>
    <meta name="description" content="Self-hostable control plane for production AI agents" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Cairn — Operator Control Plane" />
    <meta property="og:description" content="Self-hostable control plane for production AI agents. Event-sourced runtime, multi-tenant, operator-focused." />
    <meta property="og:site_name"   content="Cairn" />

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

# cairn-rs — production-ready deployment with Postgres
#
# Quick start:
#   docker compose up --build
#
# Background:
#   docker compose up -d --build
#
# Stop:
#   docker compose down
#
# Wipe everything (including database):
#   docker compose down -v
#
# Override settings via .env file:
#   cp .env.example .env && $EDITOR .env
#
# Connect an LLM provider — set one of these in .env:
#   CAIRN_BRAIN_URL + OPENAI_COMPAT_API_KEY   (OpenAI, Anthropic proxy, Groq, etc.)
#   OPENROUTER_API_KEY                         (OpenRouter)
#   OLLAMA_HOST                                (Ollama)
#   BEDROCK_API_KEY + BEDROCK_MODEL_ID         (AWS Bedrock)
#
# Or configure providers at runtime via the dashboard or POST /v1/providers/connections.
#
# In-memory mode (dev only, no Postgres needed):
#   docker compose up cairn --build   # skip postgres service
#   # and set: command: ["--db", "memory"]

services:

  # ── Postgres ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cairn
      POSTGRES_USER: cairn
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cairn-dev-password}"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cairn -d cairn"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Cairn control plane ──────────────────────────────────────────────────────
  cairn:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── Database ───────────────────────────────────────────────────────────
      DATABASE_URL: "postgres://cairn:${POSTGRES_PASSWORD:-cairn-dev-password}@postgres:5432/cairn"

      # ── Auth ───────────────────────────────────────────────────────────────
      CAIRN_ADMIN_TOKEN: "${CAIRN_ADMIN_TOKEN:-dev-admin-token}"
      CAIRN_MODE: "${CAIRN_MODE:-team}"

      # ── LLM Providers (all optional — configure via env or dashboard) ──────
      CAIRN_BRAIN_URL: "${CAIRN_BRAIN_URL:-}"
      CAIRN_WORKER_URL: "${CAIRN_WORKER_URL:-}"
      OPENAI_COMPAT_API_KEY: "${OPENAI_COMPAT_API_KEY:-}"
      OPENAI_COMPAT_BASE_URL: "${OPENAI_COMPAT_BASE_URL:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OLLAMA_HOST: "${OLLAMA_HOST:-}"
      BEDROCK_API_KEY: "${BEDROCK_API_KEY:-}"
      BEDROCK_MODEL_ID: "${BEDROCK_MODEL_ID:-}"
      AWS_REGION: "${AWS_REGION:-}"

      # ── GitHub App Integration (optional) ──────────────────────────────
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_PRIVATE_KEY_FILE: "${GITHUB_PRIVATE_KEY_FILE:-}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pg_data:
    driver: local

# cairn-rs — one-command local deployment
#
# Quick start:
#   docker compose up --build
#
# Background:
#   docker compose up -d --build
#
# Stop:
#   docker compose down
#
# Override the admin token via env file:
#   echo 'CAIRN_ADMIN_TOKEN=my-secret-token' > .env
#   docker compose up -d
#
# Connect an LLM provider (any OpenAI-compatible endpoint):
#   echo 'CAIRN_BRAIN_URL=https://your-provider/v1' >> .env
#   echo 'OPENAI_COMPAT_API_KEY=your-key' >> .env
#
# Or configure providers at runtime via the dashboard (Providers page)
# or via POST /v1/providers/connections.
#
# For persistent team mode with PostgreSQL, see docker-compose.postgres.yml

services:

  # ── Cairn control plane ───────────────────────────────────────────────────────
  cairn:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Bearer token for the admin account — override in production.
      CAIRN_ADMIN_TOKEN: "${CAIRN_ADMIN_TOKEN:-dev-admin-token}"
      # Mode: "local" (default) or "team" (requires token on every request).
      CAIRN_MODE: "${CAIRN_MODE:-local}"
      # LLM provider — Cairn is provider-agnostic. Connect any endpoint you prefer:
      # OpenAI, Anthropic, Bedrock, Vertex AI, OpenRouter, Ollama, Groq, Together, etc.
      CAIRN_BRAIN_URL: "${CAIRN_BRAIN_URL:-}"
      CAIRN_WORKER_URL: "${CAIRN_WORKER_URL:-}"
      OPENAI_COMPAT_API_KEY: "${OPENAI_COMPAT_API_KEY:-}"
      OPENAI_COMPAT_BASE_URL: "${OPENAI_COMPAT_BASE_URL:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OLLAMA_HOST: "${OLLAMA_HOST:-}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Uncomment to persist state with SQLite:
    # volumes:
    #   - cairn_data:/data
    # command: ["--db", "/data/cairn.db"]

  # Uncomment if you enable SQLite persistence above.
  # volumes:
  #   cairn_data:
  #     driver: local

# cairn-rs + Ollama — one-command local deployment
#
# Quick start:
#   docker compose up --build
#
# Background:
#   docker compose up -d --build
#
# Stop (keep model cache):
#   docker compose down
#
# Wipe everything including downloaded models:
#   docker compose down -v
#
# Pull a model into Ollama after startup:
#   docker compose exec ollama ollama pull llama3.2
#
# Override the admin token via env file:
#   echo 'CAIRN_ADMIN_TOKEN=my-secret-token' > .env
#   docker compose up -d
#
# For a production setup with PostgreSQL persistence, see docs/docker-postgres.md

services:

  # ── Ollama local LLM runtime ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      # Persist downloaded models across container restarts and rebuilds.
      - ollama_models:/root/.ollama
    environment:
      # Optional: set OLLAMA_NUM_PARALLEL to control concurrent requests.
      OLLAMA_KEEP_ALIVE: "5m"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Cairn control plane ───────────────────────────────────────────────────────
  cairn:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Bearer token for the admin account — override in production.
      CAIRN_ADMIN_TOKEN: "${CAIRN_ADMIN_TOKEN:-dev-admin-token}"
      # Point to the Ollama service in this compose network.
      OLLAMA_HOST: "http://ollama:11434"
      # Mode: "local" (default, no auth enforcement) or "team" (requires token).
      CAIRN_MODE: "${CAIRN_MODE:-local}"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Uncomment to persist state with SQLite:
    # volumes:
    #   - cairn_data:/data
    # command: ["--db", "/data/cairn.db"]

volumes:
  # Ollama model cache — survives container restarts.
  ollama_models:
    driver: local

  # Uncomment if you enable SQLite persistence above.
  # cairn_data:
  #   driver: local

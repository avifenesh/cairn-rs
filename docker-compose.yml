# cairn-rs full-stack deployment
#
# One-command startup:
#   docker compose up
#
# First-time setup (build image):
#   docker compose up --build
#
# Detached (background):
#   docker compose up -d
#
# Stop and remove containers (keep data volume):
#   docker compose down
#
# Stop and wipe all data:
#   docker compose down -v

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     cairn
      POSTGRES_PASSWORD: cairn
      POSTGRES_DB:       cairn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose 5432 locally for direct DB inspection / migrations.
      # Remove this port mapping in production to keep the DB off the host network.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cairn -d cairn"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── cairn control-plane ─────────────────────────────────────────────────────
  cairn:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Admin token for team mode — override in production.
      CAIRN_ADMIN_TOKEN: "changeme-in-production"
    # Pass the postgres URL and mode as CLI flags (the app uses --db and --mode,
    # not env vars, for storage configuration).
    command:
      - "--mode"
      - "team"
      - "--addr"
      - "0.0.0.0"
      - "--port"
      - "3000"
      - "--db"
      - "postgres://cairn:cairn@postgres:5432/cairn"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # /health returns {"status":"ok"} with no auth required.
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  # Named volume for Postgres data — survives container restarts and rebuilds.
  postgres_data:
    driver: local

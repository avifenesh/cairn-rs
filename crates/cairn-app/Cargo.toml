[package]
name = "cairn-app"
version = "0.1.0"
edition = "2021"
license = "Proprietary"
publish = false

[[bin]]
name = "cairn-app"
path = "src/main.rs"

[dependencies]
cairn-api = { path = "../cairn-api" }
cairn-memory = { path = "../cairn-memory" }

cairn-runtime = { path = "../cairn-runtime" }
cairn-evals = { path = "../cairn-evals" }
cairn-graph = { path = "../cairn-graph" }
cairn-store = { path = "../cairn-store", features = ["postgres", "sqlite"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "sqlite"], optional = false }
cairn-domain = { path = "../cairn-domain" }
cairn-tools = { path = "../cairn-tools" }
axum = { version = "0.7", features = ["ws"] }
axum-server = { version = "0.7", features = ["tls-rustls"] }
tower = { version = "0.4", features = ["full"] }
tower-http = { version = "0.5", features = ["cors", "limit", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
utoipa = "5"
uuid = { version = "1", features = ["v4"] }
rustls = "0.22"
rustls-pemfile = "2"
x509-parser = "0.16"
rust-embed = { version = "8", features = ["axum"] }
mime_guess = "2"
serde_yaml = "0.9"
chrono = { version = "0.4", features = ["serde"], default-features = false }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
http-body-util = "0.1"

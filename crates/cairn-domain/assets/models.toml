# Bundled model catalog for cairn-rs.
# User overrides go in ~/.cairn/models.toml — same format, user entries win on id conflict.
#
# Required per entry: id, provider, display_name, context_len.
# Optional with defaults: cost_type="metered", max_tokens=4096, reasoning=false,
#   supports_tools=true, supports_streaming=true, supports_json_mode=false,
#   cache_read_per_1m=0, cache_write_per_1m=0, min_cacheable_tokens=1024,
#   enabled=true.

# --- OpenAI ---

[[models]]
id              = "gpt-4o"
provider        = "openai"
display_name    = "GPT-4o"
tier            = "brain"
tags            = ["chat", "code", "vision"]
context_len     = 128000
cost_in         = 2.50
cost_out        = 10.00
cost_type       = "metered"
enabled         = true
max_tokens      = 16384
cache_read_per_1m  = 1.25
cache_write_per_1m = 0.0
reasoning       = false
input_modalities  = ["text", "image"]
supports_json_mode = true

[[models]]
id              = "gpt-4o-mini"
provider        = "openai"
display_name    = "GPT-4o Mini"
tier            = "light"
tags            = ["chat", "fast", "extraction"]

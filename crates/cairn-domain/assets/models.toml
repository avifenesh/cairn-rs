cost_in         = 0.15
cost_out        = 0.60
cost_type       = "metered"
enabled         = true
max_tokens      = 16384
cache_read_per_1m  = 0.075
cache_write_per_1m = 0.0
reasoning       = false
input_modalities  = ["text", "image"]
supports_json_mode = true


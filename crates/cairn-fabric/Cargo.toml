[package]
name = "cairn-fabric"
version = "0.1.0"
edition = "2021"
license = "BSL-1.1"
publish = false

[dependencies]
# FlowFabric crates — pinned to upstream feat/execution-engine until FF publishes to crates.io.
# Bump rev in lockstep across all six entries when FF moves forward.
ff-core = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "ee3453890216f4fcffe852f101ef9f58dd0a5f00" }
ff-sdk = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "ee3453890216f4fcffe852f101ef9f58dd0a5f00" }
ff-engine = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "ee3453890216f4fcffe852f101ef9f58dd0a5f00" }
ff-scheduler = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "ee3453890216f4fcffe852f101ef9f58dd0a5f00" }
ff-script = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "ee3453890216f4fcffe852f101ef9f58dd0a5f00" }
ferriskey = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "ee3453890216f4fcffe852f101ef9f58dd0a5f00" }

# Cairn crates
cairn-domain = { path = "../cairn-domain" }
cairn-store = { path = "../cairn-store" }

# External
uuid = { version = "1", features = ["v4", "v5", "serde"] }
tokio = { version = "1", features = ["rt", "sync", "macros", "time"] }
tokio-util = "0.7"
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
dashmap = "6"
async-trait = "0.1"

[features]
# B4 idempotency (two-phase rollout): enable ONLY once FF's
# ff_report_usage_and_check accepts the idempotency-key ARGV slot. Flipping
# this before FF ships will cause every spend to fail with "wrong number of
# arguments". See record_spend_with_execution for details.
fabric-b4-idempotency = []

[dev-dependencies]
url = "2"

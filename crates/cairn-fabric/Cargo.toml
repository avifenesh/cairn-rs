[package]
name = "cairn-fabric"
version = "0.1.0"
edition = "2021"
license = "BSL-1.1"
publish = false

[dependencies]
# FlowFabric crates — consumed from crates.io as of v0.1.1. Caret
# requirement tracks 0.1.x patches automatically; bump to `^0.2` only
# when FF cuts a deliberate breaking release.
ff-core = "0.1"
ff-sdk = "0.1"
ff-engine = "0.1"
ff-scheduler = "0.1"
ff-script = "0.1"
ferriskey = "0.1"

# Cairn crates
cairn-domain = { path = "../cairn-domain" }
cairn-store = { path = "../cairn-store" }

# External
uuid = { version = "1", features = ["v4", "v5", "serde"] }
tokio = { version = "1", features = ["rt", "sync", "macros", "time"] }
tokio-util = "0.7"
tracing = "0.1"
serde_json = "1"
thiserror = "2"

[dev-dependencies]
url = "2"
# Spin up a fresh Valkey container per cargo-test invocation (OnceCell
# shared across every test in the binary) so the integration suite does
# not require a pre-existing CAIRN_TEST_VALKEY_URL environment.
testcontainers = "0.23"
once_cell = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
uuid = { version = "1", features = ["v4"] }
# Needed by `test_orchestrator_stream` mocks to impl the async-trait-annotated
# GatherPhase / DecidePhase / ExecutePhase traits. Dev-only — library code
# uses only native async fn.
async-trait = "0.1"
# `test_orchestrator_stream` imports `TaskFrameSink` from the
# orchestrator crate to prove the sink-wire reaches FF's stream via
# the real blanket impl (not a mock). Dev-only — library code in
# cairn-fabric does not depend on cairn-orchestrator.
cairn-orchestrator = { path = "../cairn-orchestrator" }

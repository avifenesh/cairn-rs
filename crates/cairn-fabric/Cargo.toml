[package]
name = "cairn-fabric"
version = "0.1.0"
edition = "2021"
license = "BSL-1.1"
publish = false

[dependencies]
# FlowFabric crates — pinned to upstream main until FF publishes to crates.io.
# Bump rev in lockstep across all six entries when FF moves forward.
ff-core = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "a09871000574388256b1dd7c910239e992c0d3a6" }
ff-sdk = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "a09871000574388256b1dd7c910239e992c0d3a6" }
ff-engine = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "a09871000574388256b1dd7c910239e992c0d3a6" }
ff-scheduler = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "a09871000574388256b1dd7c910239e992c0d3a6" }
ff-script = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "a09871000574388256b1dd7c910239e992c0d3a6" }
ferriskey = { git = "https://github.com/avifenesh/FlowFabric.git", rev = "a09871000574388256b1dd7c910239e992c0d3a6" }

# Cairn crates
cairn-domain = { path = "../cairn-domain" }
cairn-store = { path = "../cairn-store" }

# External
uuid = { version = "1", features = ["v4", "v5", "serde"] }
tokio = { version = "1", features = ["rt", "sync", "macros", "time"] }
tokio-util = "0.7"
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
dashmap = "6"
async-trait = "0.1"

[features]
# Direct (scheduler-bypassing) claim path. Forwards to ff-sdk's
# `insecure-direct-claim` feature so CairnWorker::claim_next is available.
# DO NOT enable in production: the direct path skips the budget and quota
# admission checks that only ff-scheduler enforces. Intended for
# integration tests and local dev only — production must go through
# FabricSchedulerService::claim_for_worker. See worker_sdk.rs for the
# architectural dispute note (cairn cannot wrap a scheduler-mediated
# CairnTask today because ff_sdk::task::ClaimedTask::new is pub(crate)
# at FF @a09871000574388256b1dd7c910239e992c0d3a6).
insecure-direct-claim = ["ff-sdk/insecure-direct-claim"]

[dev-dependencies]
url = "2"
# Spin up a fresh Valkey container per cargo-test invocation (OnceCell
# shared across every test in the binary) so the integration suite does
# not require a pre-existing CAIRN_TEST_VALKEY_URL environment.
testcontainers = "0.23"
once_cell = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
uuid = { version = "1", features = ["v4"] }

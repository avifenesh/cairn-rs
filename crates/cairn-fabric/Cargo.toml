[package]
name = "cairn-fabric"
version = "0.1.0"
edition = "2021"
license = "BSL-1.1"
publish = false

[features]
default = []
# Expose the Valkey testcontainers harness under `cairn_fabric::test_harness`.
# Off by default — production binaries never link testcontainers. Consumers
# that run live-Valkey integration tests (cairn-fabric's own test binary,
# cairn-app's HTTP integration tests) turn this on via dev-dependencies.
test-harness = ["dep:testcontainers", "dep:url"]

[dependencies]
# FlowFabric crates — consumed from crates.io as of v0.1.1. Caret
# requirement tracks 0.1.x patches automatically; bump to `^0.2` only
# when FF cuts a deliberate breaking release.
ff-core = "0.1"
ff-sdk = "0.1"
ff-engine = "0.1"
ff-scheduler = "0.1"
ff-script = "0.1"
ferriskey = "0.1"

# Cairn crates
cairn-domain = { path = "../cairn-domain" }
cairn-store = { path = "../cairn-store" }

# External
uuid = { version = "1", features = ["v4", "v5", "serde"] }
tokio = { version = "1", features = ["rt", "sync", "macros", "time"] }
tokio-util = "0.7"
tracing = "0.1"
serde_json = "1"
thiserror = "2"
# Gated behind `test-support` — pulled in only when the harness is needed.
testcontainers = { version = "0.23", optional = true }
url = { version = "2", optional = true }

[dev-dependencies]
# Own integration suite consumes the same harness via the feature.
cairn-fabric = { path = ".", features = ["test-harness"] }
once_cell = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
uuid = { version = "1", features = ["v4"] }
# Needed by `test_orchestrator_stream` mocks to impl the async-trait-annotated
# GatherPhase / DecidePhase / ExecutePhase traits. Dev-only — library code
# uses only native async fn.
async-trait = "0.1"
# `test_orchestrator_stream` imports `TaskFrameSink` from the
# orchestrator crate to prove the sink-wire reaches FF's stream via
# the real blanket impl (not a mock). Dev-only — library code in
# cairn-fabric does not depend on cairn-orchestrator.
cairn-orchestrator = { path = "../cairn-orchestrator" }

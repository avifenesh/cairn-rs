name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Format ────────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── 2. Check ─────────────────────────────────────────────────────────────────
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: cargo check
        run: cargo check --workspace

  # ── 3. Clippy ────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── 4. Rust Tests ────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: cargo test --lib
        run: cargo test --workspace --lib
        timeout-minutes: 10
      - name: integration tests (providers + domain + evals)
        run: cargo test --tests -p cairn-domain -p cairn-providers -p cairn-evals
        timeout-minutes: 8
        env:
          CARGO_BUILD_JOBS: "2"
      - name: integration tests (runtime + orchestrator + app)
        # Handler tests run against the read-only FakeFabric fixture
        # under `crates/cairn-app/tests/support/` (no Valkey required).
        # cairn-runtime and cairn-orchestrator contribute 41 + 1
        # non-gated integration test binaries that exercise service,
        # projection, and orchestrator surfaces — they must run here
        # because `--workspace --lib` only covers `src/` unit tests.
        run: cargo test --tests -p cairn-runtime -p cairn-orchestrator -p cairn-app
        timeout-minutes: 15
        env:
          CARGO_BUILD_JOBS: "2"
          RUSTFLAGS: "-C debuginfo=0"

  # ── 5. Fabric integration (testcontainers) ──────────────────────────────────
  # Stands up a disposable Valkey 8 container via testcontainers-rs and runs
  # the cairn-fabric integration suite end-to-end against it. Runs in
  # parallel (default threadpool) — the harness uses per-test uuid-scoped
  # (tenant, workspace, project) triples to keep keyspaces disjoint.
  fabric-integration:
    name: fabric-integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-fabric-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fabric-
            ${{ runner.os }}-cargo-
      - name: cargo test --test integration (default — parallel)
        run: cargo test -p cairn-fabric --test integration
        timeout-minutes: 10

  # ── 6. UI Build + Type Check + Component Tests ──────────────────────────────
  ui:
    name: ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm install
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: build
        run: npm run build
      - name: vitest
        run: npx vitest run

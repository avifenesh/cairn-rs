name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Prevent sqlx from trying to connect to a database at compile time.
  SQLX_OFFLINE: "true"
  # Tighten Rust warnings across the board.
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: Check / Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install the exact toolchain declared in rust-toolchain.toml (stable).
      # dtolnay/rust-toolchain reads rust-toolchain.toml automatically.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache both the cargo registry (downloaded crates) and the compiled
      # target artefacts so incremental builds are fast on subsequent runs.
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build artefacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      # Format ----------------------------------------------------------------
      - name: Check formatting
        run: cargo fmt --all --check

      # Lint ------------------------------------------------------------------
      # Run clippy on every crate. RUSTFLAGS=-D warnings turns lint warnings
      # into hard errors so they cannot accumulate unnoticed.
      - name: Clippy
        run: cargo clippy --workspace --all-targets

      # Library tests ---------------------------------------------------------
      # cairn-app is excluded because its lib.rs carries in-progress work that
      # currently does not compile cleanly; the binary and integration tests
      # are covered separately by the maintainers.
      - name: Library tests
        run: cargo test --workspace --exclude cairn-app --lib

      # Full workspace build --------------------------------------------------
      # Ensures the entire workspace compiles even when some integration tests
      # are excluded above.
      - name: Build workspace
        run: cargo build --workspace

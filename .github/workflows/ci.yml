name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"   # never probe a live DB at compile time

# Cancel in-flight runs for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Shared cache priming ─────────────────────────────────────────────────────
  # All Rust jobs depend on the same registry + build caches; they restore
  # from the keys written here on the first run of each lock-file revision.

  # ── 1. Format ────────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  # ── 2. Check ─────────────────────────────────────────────────────────────────
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: cargo check --workspace
        run: cargo check --workspace

  # ── 3. Clippy ────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      # Library crates: hard-fail on every warning.
      - name: clippy (lib crates, -D warnings)
        run: >
          cargo clippy
          --workspace --exclude cairn-app
          --all-targets
          -- -D warnings
      # Application crate: same standard as library crates.
      - name: clippy (cairn-app)
        run: >
          cargo clippy -p cairn-app --all-targets
          -- -D warnings

  # ── 4. Test ──────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      # Unit tests (all crates)
      - name: cargo test --lib
        run: cargo test --workspace --lib
        timeout-minutes: 8
      # Integration tests (exclude cairn-app — needs full HTTP server scaffold)
      - name: cargo test --tests (non-app)
        run: cargo test --workspace --exclude cairn-app --tests
        timeout-minutes: 8
      # cairn-app integration tests (HTTP surface + end-to-end workflows)
      - name: cairn-app integration tests
        run: >
          cargo test -p cairn-app
          --test bootstrap_server
          --test full_workspace_suite
          --test source_refresh
          --test request_tracing
          --test entitlement_gates
        timeout-minutes: 8

  # ── 5. UI build ──────────────────────────────────────────────────────────────
  ui-build:
    name: ui-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: npm ci
        run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: npm run build
        run: npm run build
